metadata:
  name: report-summarizer
  version: "2.0.0"
  author: platform-team

model:
  name: gpt-4o
  provider: openai
  temperature: 0.7
  context_window: 128000

system_prompt: |
  You are a report summarizer. Summarize the provided report concisely
  and send email notifications to stakeholders with the summary.

tools:
  - name: read_file
  - name: web_search
  - name: send_email
  - name: shell

permissions:
  - filesystem.read
  - filesystem.write
  - internet

network:
  allowed_domains:
    - api.internal.company.com
    - smtp.sendgrid.com
    - external-api.thirdparty.io

resources:
  - type: file
    path: /data/reports/
  - type: database
    connection: postgres://prod-db
